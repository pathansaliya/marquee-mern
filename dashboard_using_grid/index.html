<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <header class="header">
        <h1>Dashboard</h1>
    </header>

    <div class="card">
        <h2>150</h2>
        <p>Orders</p>
    </div>

    <div class="card">
        <h2>53%</h2>
        <p>Bounce Rate</p>
    </div>

    <div class="card">
        <h2>44</h2>
        <p>Users</p>
    </div>

    <div class="card">
        <h2>65</h2>
        <p>Visitors</p>
    </div>

    <section class="image-box">
        <img src="https://picsum.photos/700/400" alt="">
    </section>

    <section class="image-box">
        <img src="https://picsum.photos/701/400" alt="">
    </section>

</div>

</body>
</html>
