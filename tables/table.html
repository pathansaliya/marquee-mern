<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML TABLE</title>
    <style>
        table,
        td,
        th,
        tr{
            border: 1px solid;
            border-collapse: collapse;
            padding: 5px;
        }
        thead{
            background-color: rgb(57, 148, 228);
        }
</style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Emp Code</th>
                <th>Emp Name</th>
                <th>job Title</th>
                <th>salary(LPA)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>911</td>
                <td>saliya banu</td>
                <td>developer</td>
                <td>8.5</td>
            </tr>
            <tr>
                <td>912</td>
                <td>saliya banu </td>
                <td>developer</td>
                <td>6.5</td>
            </tr>
            <tr>
                <td>913</td>
                <td>saliya banu</td>
                <td>Tester</td>
                <td>9.5</td>
            </tr>
            <tr>
                <td>914</td>
                <td>saliya banu</td>
                <td>Digital marketing</td>
                <td>6.5</td>
            </tr>
            <tr>
                <td>915</td>
                <td>saliya banu</td>
                <td>HR</td>
                <td>5.5</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4">This is a table</td>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
