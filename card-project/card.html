<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Card</title>

<style>

body{
    background-color: antiquewhite;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100 vh;
}

#container{
    width:400px;
    height:550px;
    border-radius:20px;
    box-shadow:2px 2px 5px gray;
    overflow:hidden;
    background-color:white;
}

.img-container{
    position:relative;
   
}

.img-container img{
    width:100%;
    height:300px;
    object-fit:cover;
    /* border-radius:20px; */
    box-shadow:2px 2px 5px gray;
}

.like-box{
    position:absolute;
    top:10px;
    left:10px;

    width:40px;
    height:40px;

    border-radius:50%;
    background-color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:2px 2px 5px gray;
}

.details{
    padding:20px;
    background-color: rgb(237, 199, 149);
}

h2{
    font-family:Verdana, Geneva, Tahoma, sans-serif;
}

h3{
    background-color:black;
    color:white;
    width:40%;
    text-align:center;
    border-radius:20px;
    padding:8px;
}

</style>
</head>

<body>

<article id="container">

    <section class="img-container">

        <div class="like-box">❤️</div>

        <img src="https://images.unsplash.com/photo-1560769629-975ec94e6a86?q=80&w=764&auto=format&fit=crop"
        alt="product image">

    </section>

    <section class="details">

        <h2>Shoes</h2>

        <h3>$41.00 USD</h3>

        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Porro non atque a amet consectetur adipisicing elit.
            amet consectetur adipisicing elit.?
        </p>

    </section>

</article>

</body>
</html>
